apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gw
  template:
    metadata:
      labels:
        app: api-gw
    spec:
      containers:
        - name: api-gw
          image: hcr.io/td-exam-2026-alumni/api-gw:latest
          ports:
            - containerPort: 3000
