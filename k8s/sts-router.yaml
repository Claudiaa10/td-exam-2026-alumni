apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-router
spec:
  serviceName: svc-router
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
        - name: router
          image: ghcr.io/tuusuario/api-gw:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: svc-storage
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: svc-storage
      spec:
        accessModes: "ReadWriteOnce"
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
